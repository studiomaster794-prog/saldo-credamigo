<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SaldoCred</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png" type="image/png">

<!-- iOS Splash -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SaldoCred">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<!-- Theme -->
<meta name="theme-color" content="#070b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="SaldoCred">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#05080f;
  --glass:rgba(20,28,48,0.92);
  --glass-border:rgba(255,255,255,0.28);
  --glass-border2:rgba(255,255,255,0.4);
  --surface:#121a2e;
  --input-bg:#0a1224;
  --input-border:#5b6b8c;
  --primary:#7c83ff;
  --primary-glow:rgba(124,131,255,0.35);
  --text:#ffffff;
  --text2:rgba(255,255,255,0.82);
  --text3:rgba(255,255,255,0.55);
  --accent:#2ee6c8;
  --accent-glow:rgba(46,230,200,0.35);
  --secondary:#ff6b8a;
  --secondary-glow:rgba(255,107,138,0.35);
  --green:#22f0a0;
  --green-bg:rgba(34,240,160,0.14);
  --red:#ff4d6d;
  --red-bg:rgba(255,77,109,0.14);
  --r:18px;
  --r2:14px;
  --r3:12px;
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  position:relative;
  -webkit-tap-highlight-color:transparent;
}

/* ===== BACKGROUND ORBS ===== */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-orbs .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4;will-change:transform;}
.orb-1{width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,0.35) 0%,transparent 70%);top:-100px;right:-80px;animation:orbFloat 10s ease-in-out infinite;}
.orb-2{width:350px;height:350px;background:radial-gradient(circle,rgba(45,212,191,0.3) 0%,transparent 70%);bottom:150px;left:-100px;animation:orbFloat 12s ease-in-out infinite reverse;}
.orb-3{width:280px;height:280px;background:radial-gradient(circle,rgba(16,185,129,0.2) 0%,transparent 70%);bottom:300px;right:80px;animation:orbFloat 14s ease-in-out infinite 2s;}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(20px,-25px) scale(1.05);}
  66%{transform:translate(-15px,20px) scale(0.95);}
}

/* ===== SCROLLABLE CONTENT ===== */
.scroll-content{
  height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
  padding:20px 20px 40px;
  position:relative;
  z-index:1;
}
.scroll-content::-webkit-scrollbar{width:3px;}
.scroll-content::-webkit-scrollbar-track{background:transparent;}
.scroll-content::-webkit-scrollbar-thumb{background:var(--glass-border2);border-radius:4px;}

/* ===== HEADER ===== */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}
.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}
.header-logo{
  width:48px;height:48px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;
  box-shadow:0 4px 20px rgba(99,102,241,0.35);
}
.header-text h1{
  font-size:20px;font-weight:700;letter-spacing:-.02em;
  line-height:1.2;
}
.header-btn{
  padding:10px 18px;
  border-radius:var(--r3);
  border:1px solid var(--glass-border);
  background:var(--glass);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:12px;font-weight:600;
  cursor:pointer;
  transition:all .2s;
  display:flex;align-items:center;gap:6px;
}
.header-btn:hover{border-color:var(--glass-border2);background:rgba(255,255,255,0.06);}
.header-btn svg{width:14px;height:14px;}

/* ===== SALDO CARD ===== */
.saldo-card{
  background:linear-gradient(145deg,#152238 0%,#0d1528 100%);
  border:2px solid rgba(46,230,200,0.45);
  border-radius:var(--r);
  padding:22px 20px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 8px 28px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08);
  position:relative;
  overflow:hidden;
}
.saldo-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 20% 0%,rgba(46,230,200,0.18),transparent 55%);
  pointer-events:none;
}
.saldo-info{position:relative;z-index:1;}
.saldo-label{
  font-size:13px;color:var(--text2);font-weight:700;margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.06em;
}
.saldo-value{
  font-size:34px;font-weight:800;letter-spacing:-.04em;line-height:1.1;
  font-feature-settings:"tnum";
  color:var(--green);
  text-shadow:0 0 24px rgba(34,240,160,0.35);
}


/* ===== PILLS SUMMARY ===== */
.pills-row{
  display:flex;
  gap:10px;
  margin-bottom:22px;
}
.pill{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:12px 12px;
  border-radius:var(--r3);
  border:2px solid transparent;
  background:var(--surface);
}
.pill.green{
  background:rgba(34,240,160,0.12);
  border-color:rgba(34,240,160,0.55);
}
.pill.red{
  background:rgba(255,77,109,0.12);
  border-color:rgba(255,77,109,0.55);
}
.pill svg{width:16px;height:16px;flex-shrink:0;}
.pill.green svg{color:var(--green);}
.pill.red svg{color:var(--red);}
.pill span{
  font-size:12px;font-weight:700;letter-spacing:-.01em;
  font-feature-settings:"tnum";
  color:var(--text);
}

/* ===== SECTIONS (ENTRADAS/SAÍDAS) ===== */
.section{
  margin-bottom:26px;
}
.section-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.section-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:15px;font-weight:800;
  text-transform:uppercase;letter-spacing:.06em;
}
.section-title svg{width:18px;height:18px;}
.section-title.entradas{color:var(--accent);}
.section-title.saidas{color:var(--secondary);}
.section-count{
  min-width:30px;height:30px;padding:0 8px;
  border-radius:9px;
  background:var(--surface);
  border:2px solid var(--glass-border);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;
}

/* ===== FORM CARD ===== */
.form-card{
  background:var(--surface);
  border:2.5px solid var(--glass-border2);
  border-radius:var(--r);
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 10px 28px rgba(0,0,0,0.4);
  position:relative;
  overflow:hidden;
}
.form-card.entrada{
  border-color:rgba(46,230,200,0.75);
  box-shadow:0 10px 28px rgba(0,0,0,0.4), 0 0 0 1px rgba(46,230,200,0.15);
}
.form-card.saida{
  border-color:rgba(255,107,138,0.8);
  box-shadow:0 10px 28px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,107,138,0.18);
}
.form-field{
  margin-bottom:14px;
  position:relative;z-index:1;
}
.form-field label{
  display:block;
  font-size:12px;
  font-weight:800;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:#dbe4ff;
  margin-bottom:7px;
}
.form-card.saida .form-field label{color:#ffd0da;}
.form-card.entrada .form-field label{color:#c6fff3;}
.form-field input{
  width:100%;
  background:var(--input-bg);
  border:2.5px solid var(--input-border);
  border-radius:var(--r3);
  padding:15px 14px;
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:600;
  color:#fff;
  outline:none;
  transition:border-color .15s,box-shadow .15s,background .15s;
  min-height:52px;
}
.form-field input::placeholder{color:rgba(255,255,255,0.42);font-weight:500;}
.form-card.saida .form-field input{
  border-color:rgba(255,107,138,0.55);
  background:#140a12;
}
.form-card.entrada .form-field input{
  border-color:rgba(46,230,200,0.5);
  background:#071410;
}
.form-field input:focus{
  border-color:#fff;
  box-shadow:0 0 0 3px rgba(255,255,255,0.18);
  background:#000;
}
.form-card.saida .form-field input:focus{
  border-color:var(--secondary);
  box-shadow:0 0 0 3px var(--secondary-glow);
}
.form-card.entrada .form-field input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.form-row{
  display:flex;
  gap:10px;
}
.form-row .form-field{flex:1;min-width:0;}

/* Date input styling */
input[type="date"]{
  color-scheme:dark;
}
input[type="date"]::-webkit-calendar-picker-indicator{
  filter:invert(1);opacity:.85;cursor:pointer;
}

/* Number input arrows */
input[type="number"]{
  -moz-appearance:textfield;
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button{
  opacity:1;
  height:32px;
}

/* ===== REGISTER BUTTON ===== */
.register-btn{
  width:100%;
  padding:16px;
  border-radius:var(--r3);
  border:2px solid transparent;
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:800;
  letter-spacing:.02em;
  cursor:pointer;
  transition:all .15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  position:relative;z-index:1;
  margin-top:2px;
  min-height:54px;
  text-transform:uppercase;
}
.register-btn:active{transform:scale(0.98);}
.register-btn svg{width:20px;height:20px;}

.register-btn.entrada{
  background:linear-gradient(135deg,#2ee6c8 0%,#0d9488 100%);
  color:#042f2e;
  border-color:#5ff5dd;
  box-shadow:0 6px 22px rgba(46,230,200,0.4);
}
.register-btn.entrada:hover{
  box-shadow:0 8px 28px rgba(46,230,200,0.55);
  filter:brightness(1.05);
}

.register-btn.saida{
  background:linear-gradient(135deg,#ff6b8a 0%,#e11d48 100%);
  color:#fff;
  border-color:#ff9db1;
  box-shadow:0 6px 22px rgba(255,77,109,0.45);
}
.register-btn.saida:hover{
  box-shadow:0 8px 28px rgba(255,77,109,0.6);
  filter:brightness(1.05);
}

/* ===== TRANSACTION LIST ===== */
.tx-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  background:var(--surface);
  border:2px solid var(--glass-border);
  border-radius:var(--r);
  margin-bottom:10px;
  transition:all .2s;
}
.tx-item.saida-item{border-color:rgba(255,107,138,0.35);}
.tx-item.entrada-item{border-color:rgba(46,230,200,0.35);}
.tx-dot{
  width:12px;height:12px;
  border-radius:50%;
  flex-shrink:0;
}
.tx-dot.green{background:var(--green);box-shadow:0 0 12px rgba(34,240,160,0.65);}
.tx-dot.red{background:var(--red);box-shadow:0 0 12px rgba(255,77,109,0.65);}
.tx-info{flex:1;min-width:0;}
.tx-name{font-size:15px;font-weight:700;margin-bottom:3px;word-break:break-word;}
.tx-date{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;font-weight:500;}
.tx-date svg{width:12px;height:12px;}
.tx-amount{
  font-size:16px;font-weight:800;
  font-feature-settings:"tnum";
  letter-spacing:-.02em;
  white-space:nowrap;
}
.tx-amount.green{color:var(--green);}
.tx-amount.red{color:var(--red);}
.tx-delete{
  background:rgba(255,77,109,0.12);
  border:1.5px solid rgba(255,77,109,0.4);
  color:#ffb3c1;
  cursor:pointer;
  padding:8px 10px;
  border-radius:10px;
  transition:all .15s;
  font-size:14px;font-weight:700;
  line-height:1;
}
.tx-delete:active{background:var(--red);color:#fff;}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .4s ease forwards;}

/* ===== RESPONSIVE ===== */
@media(max-width:480px){
  .scroll-content{padding:16px 16px 40px;}
  .saldo-value{font-size:22px;}
  .pills-row{gap:8px;}
  .pill{padding:10px 12px;font-size:12px;}
  .pill span{font-size:12px;}
  .pill svg{width:14px;height:14px;}
}
</style>
</head>
<body>

<!-- Background Orbs -->
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Main Content -->
<div class="scroll-content">

  <!-- Header -->
  <div class="header fade-in">
    <div class="header-left">
      <div class="header-logo">S</div>
      <div class="header-text">
        <h1>Saldo Cred</h1>
      </div>
    </div>
  </div>

  <!-- Saldo Card -->
  <div class="saldo-card fade-in">
    <div class="saldo-info">
      <div class="saldo-label">Saldo disponível</div>
      <div class="saldo-value" id="saldo">R$ 0,00</div>
    </div>

  </div>

  <!-- Pills Summary -->
  <div class="pills-row fade-in">
    <div class="pill red">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      <span>Saiu: <strong id="totOut">R$ 0,00</strong></span>
    </div>
    <div class="pill green">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      <span>Entrou: <strong id="totIn">R$ 0,00</strong></span>
    </div>
  </div>

  <!-- SAÍDAS Section (primeiro: uso diário — carro de som, serviços etc.) -->
  <div class="section fade-in">
    <div class="section-header">
      <div class="section-title saidas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        SAÍDAS
      </div>
      <div class="section-count" id="countOut">0</div>
    </div>

    <!-- Form Saída -->
    <div class="form-card saida">
      <div class="form-field">
        <label for="outNome">Nome / serviço</label>
        <input type="text" id="outNome" placeholder="Ex: carro de som" maxlength="30" autocomplete="off">
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="outValor">Valor (R$)</label>
          <input type="number" id="outValor" placeholder="0,00" min="0" step="0.01" inputmode="decimal">
        </div>
        <div class="form-field">
          <label for="outData">Data</label>
          <input type="date" id="outData">
        </div>
      </div>
      <button class="register-btn saida" onclick="addSaida()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Registrar saída
      </button>
    </div>

    <!-- Lista de Saídas -->
    <div id="listaSaidas"></div>
  </div>

  <!-- ENTRADAS Section (depois: depósito ocasional do Cred Amigo) -->
  <div class="section fade-in">
    <div class="section-header">
      <div class="section-title entradas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        ENTRADAS
      </div>
      <div class="section-count" id="countIn">0</div>
    </div>

    <!-- Form Entrada -->
    <div class="form-card entrada">
      <div class="form-field">
        <label for="inNome">Nome / origem</label>
        <input type="text" id="inNome" placeholder="Ex: depósito Cred Amigo" maxlength="30" autocomplete="off">
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="inValor">Valor (R$)</label>
          <input type="number" id="inValor" placeholder="0,00" min="0" step="0.01" inputmode="decimal">
        </div>
        <div class="form-field">
          <label for="inData">Data</label>
          <input type="date" id="inData">
        </div>
      </div>
      <button class="register-btn entrada" onclick="addEntrada()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Registrar entrada
      </button>
    </div>

    <!-- Lista de Entradas -->
    <div id="listaEntradas"></div>
  </div>

</div>

<!-- Service Worker -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(reg => {
        console.log('[SW] registered', reg.scope);
        // força checagem de atualização (corrige SW antigo no celular)
        reg.update().catch(() => {});
      })
      .catch(err => console.log('[SW] register failed', err));
  });
}
</script>

<script>
// ===== DATA =====
let db = JSON.parse(localStorage.getItem('seiko_caixa') || '{"in":[],"out":[]}');

const brl = v => parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt = v => 'R$ ' + brl(v);
const uid = () => Date.now()+'_'+Math.random().toString(36).slice(2,5);
const save = () => { try{localStorage.setItem('seiko_caixa',JSON.stringify(db));}catch(e){} };
const fmtDate = d => { if(!d)return''; const[y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; };

// ===== ENTRADAS =====
function addEntrada(){
  const nome = document.getElementById('inNome').value.trim();
  const valor = parseFloat(document.getElementById('inValor').value);
  const data = document.getElementById('inData').value;

  if(!nome || isNaN(valor) || valor<=0){
    alert('Preencha nome e valor válido!');
    return;
  }

  db.in.push({id:uid(), nome, valor, data});
  save();
  render();

  // Clear form
  document.getElementById('inNome').value = '';
  document.getElementById('inValor').value = '';
}

// ===== SAÍDAS =====
function addSaida(){
  const nome = document.getElementById('outNome').value.trim();
  const valor = parseFloat(document.getElementById('outValor').value);
  const data = document.getElementById('outData').value;

  if(!nome || isNaN(valor) || valor<=0){
    alert('Preencha nome e valor válido!');
    return;
  }

  db.out.push({id:uid(), nome, valor, data});
  save();
  render();

  // Clear form
  document.getElementById('outNome').value = '';
  document.getElementById('outValor').value = '';
}

// ===== REMOVE =====
function removeEntrada(id){
  db.in = db.in.filter(i => i.id !== id);
  save();
  render();
}

function removeSaida(id){
  db.out = db.out.filter(i => i.id !== id);
  save();
  render();
}

// ===== RENDER =====
function render(){
  // Totals
  const totIn = db.in.reduce((s,i) => s + i.valor, 0);
  const totOut = db.out.reduce((s,i) => s + i.valor, 0);
  const saldo = totIn - totOut;

  document.getElementById('totIn').textContent = fmt(totIn);
  document.getElementById('totOut').textContent = fmt(totOut);
  const saldoEl = document.getElementById('saldo');
  saldoEl.textContent = fmt(saldo);
  saldoEl.style.color = saldo > 0 ? 'var(--green)' : (saldo < 0 ? 'var(--red)' : '#ffd166');
  document.getElementById('countIn').textContent = db.in.length;
  document.getElementById('countOut').textContent = db.out.length;

  // Render Entradas
  const listaEntradas = document.getElementById('listaEntradas');
  if(db.in.length === 0){
    listaEntradas.innerHTML = '';
  } else {
    listaEntradas.innerHTML = db.in.map(i => `
      <div class="tx-item entrada-item">
        <div class="tx-dot green"></div>
        <div class="tx-info">
          <div class="tx-name">${i.nome}</div>
          <div class="tx-date">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${i.data ? fmtDate(i.data) : ''}
          </div>
        </div>
        <div class="tx-amount green">+${brl(i.valor)}</div>
        <button class="tx-delete" onclick="removeEntrada('${i.id}')" title="Remover" aria-label="Remover entrada">✕</button>
      </div>
    `).join('');
  }

  // Render Saídas
  const listaSaidas = document.getElementById('listaSaidas');
  if(db.out.length === 0){
    listaSaidas.innerHTML = '';
  } else {
    listaSaidas.innerHTML = db.out.map(i => `
      <div class="tx-item saida-item">
        <div class="tx-dot red"></div>
        <div class="tx-info">
          <div class="tx-name">${i.nome}</div>
          <div class="tx-date">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${i.data ? fmtDate(i.data) : ''}
          </div>
        </div>
        <div class="tx-amount red">-${brl(i.valor)}</div>
        <button class="tx-delete" onclick="removeSaida('${i.id}')" title="Remover" aria-label="Remover saída">✕</button>
      </div>
    `).join('');
  }
}

// ===== INIT =====
const hoje = new Date().toISOString().split('T')[0];
document.getElementById('inData').value = hoje;
document.getElementById('outData').value = hoje;

// Enter key support
document.getElementById('inNome').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('inValor').focus(); });
document.getElementById('inValor').addEventListener('keydown', e => { if(e.key==='Enter') addEntrada(); });
document.getElementById('outNome').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('outValor').focus(); });
document.getElementById('outValor').addEventListener('keydown', e => { if(e.key==='Enter') addSaida(); });

render();
</script>
</body>
</html>
